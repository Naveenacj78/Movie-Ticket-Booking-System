{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <h2>Sales Report</h2>

    <hr>

    <table class="table table-bordered">

        <thead class="table-dark">

            <tr>

                <th>Movie</th>
                <th>Tickets Sold</th>

            </tr>

        </thead>

        <tbody>

            {% for row in report %}

            <tr>

                <td>{{ row[0] }}</td>
                <td>{{ row[1] }}</td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

    <a href="/admin-dashboard"
       class="btn btn-secondary">

        Back

    </a>

</div>

{% endblock %}
