{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <h2>Edit Movie</h2>

    <form method="POST">

        <div class="mb-3">
            <label>Title</label>

            <input type="text"
                   name="title"
                   value="{{ movie[1] }}"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Genre</label>

            <input type="text"
                   name="genre"
                   value="{{ movie[2] }}"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Show Time</label>

            <input type="text"
                   name="show_time"
                   value="{{ movie[3] }}"
                   class="form-control">
        </div>

        <button class="btn btn-primary">
            Update Movie
        </button>

    </form>

</div>

{% endblock %}
